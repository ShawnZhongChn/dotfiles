# Main tmux config. Keep module paths relative to this file so it works on
# local macOS and remote Linux hosts after the dotfiles repo is cloned.
source-file ~/.config/tmux/conf.d/00-prefix.conf
source-file ~/.config/tmux/conf.d/10-core.conf
source-file ~/.config/tmux/conf.d/20-keybindings.conf
source-file ~/.config/tmux/conf.d/30-ui.conf

if-shell '[ -f ~/.config/tmux/conf.d/40-plugins.conf ]' 'source-file ~/.config/tmux/conf.d/40-plugins.conf'
if-shell '[ -x ~/.tmux/plugins/tpm/tpm ]' 'run ~/.tmux/plugins/tpm/tpm'
