# ==========================================
# 快捷键绑定 (Key Bindings)
# ==========================================
# 快捷重载配置（显式重载当前仓库配置）
bind r source-file /Users/shawn/dotfiles/tmux/.tmux.conf \; display-message "Tmux config reloaded!"

# TmuxCC 仪表盘（prefix + t）
bind t if-shell '[ -x "$HOME/.local/bin/tmuxcc" ]' 'display-popup -E "$HOME/.local/bin/tmuxcc"' 'display-message "tmuxcc not found: ~/.local/bin/tmuxcc"'

# 窗口重命名
bind , command-prompt -I "#W" "rename-window '%%'"

# 创建窗口与面板 (保持当前路径)
bind n new-window
bind - split-window -v -c '#{pane_current_path}'  # 垂直分割
bind \\ split-window -h -c '#{pane_current_path}' # 水平分割

# 窗口切换（显式保证 prefix + 1..9 可切换）
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# 保留 Alt + 数字快速切窗
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# H/L 切换窗口
bind -r H previous-window
bind -r L next-window

# 面板导航 (Vim 风格)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 面板调整大小
bind -n M-Left resize-pane -L 2
bind -n M-Right resize-pane -R 2
bind -n M-Up resize-pane -U 2
bind -n M-Down resize-pane -D 2
bind -n C-S-z resize-pane -Z      # 最大化/恢复当前面板

# 复制模式 (Vim 风格)
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
